<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>短线狙击控制台</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/bootstrap/5.1.3/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; overflow-x: hidden;}
        .container-fluid { padding: 20px; }

        /* 卡片样式 */
        .card-custom { background-color: #1e1e1e; border: 1px solid #333; margin-bottom: 20px; }
        .card-header { background-color: #252526; font-weight: bold; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center;}

        /* 表格样式 */
        .table { margin-bottom: 0; font-size: 0.9rem; }
        .table-dark { background-color: #1e1e1e; --bs-table-bg: #1e1e1e; }
        .table-hover tbody tr:hover { background-color: #2c2c2c; }
        th { color: #888; font-weight: normal; }

        /* 颜色定义 */
        .txt-gold { color: #ffd700; font-weight: bold; }
        .txt-red { color: #ff4d4d; }
        .txt-green { color: #00cc00; }
        .txt-blue { color: #4dabf7; cursor: pointer; text-decoration: underline; }
        .txt-speed { color: #ff00ff; font-weight: bold; } /* 紫色代表急速 */

        .badge-industry { background-color: #333; color: #aaa; font-weight: normal; padding: 2px 6px; border-radius: 4px; font-size: 0.8em; }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <h3 class="d-inline">🦅 短线狙击控制台</h3>
            <span id="status" class="ms-3 text-muted" style="font-size: 0.9em;">等待启动...</span>
        </div>
        <button id="startBtn" class="btn btn-primary btn-sm" onclick="startSystem()">🚀 启动系统</button>
    </div>

    <div class="row">
        <div class="col-md-6">
            <div class="card card-custom">
                <div class="card-header">
                    <span>💔 炸板监控 (找回封T字)</span>
                    <small class="text-muted">回落 < 2% 优选</small>
                </div>
                <div class="table-responsive">
                    <table class="table table-dark table-hover align-middle">
                        <thead>
                            <tr>
                                <th>代码</th>
                                <th>名称</th>
                                <th>板块</th>
                                <th>现幅</th>
                                <th>回落(关键)</th>
                            </tr>
                        </thead>
                        <tbody id="zhabanTable"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card card-custom">
                <div class="card-header">
                    <span>🔥 急速拉升 (找半路确认)</span>
                    <small class="text-muted">5分钟涨速排行</small>
                </div>
                <div class="table-responsive">
                    <table class="table table-dark table-hover align-middle">
                        <thead>
                            <tr>
                                <th>代码</th>
                                <th>名称</th>
                                <th>板块</th>
                                <th>现幅</th>
                                <th>5分涨速</th>
                            </tr>
                        </thead>
                        <tbody id="rocketTable"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<audio id="alertSound" src="data:audio/wav;base64,UklGRl9vT19XQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YU" preload="auto"></audio>

<script>
    let isRunning = false;
    let seenZhaban = new Set(); // 记录已炸板

    function startSystem() {
        if (isRunning) return;
        isRunning = true;
        document.getElementById('startBtn').style.display = 'none';
        document.getElementById('status').innerText = '系统运行中 (每3秒刷新)';
        document.getElementById('status').classList.remove('text-muted');
        document.getElementById('status').classList.add('text-success');

        playAlert(true); // 激活音频上下文
        fetchData();
        setInterval(fetchData, 3000);
    }

    function playAlert(isSilent=false) {
        const audio = document.getElementById('alertSound');
        if (!isSilent) {
            // 简单的嘀声
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.frequency.value = 880;
            gain.gain.value = 0.1;
            osc.start();
            setTimeout(() => osc.stop(), 200);
        }
    }

    async function fetchData() {
        try {
            const res = await fetch('/api/data');
            const data = await res.json();
            renderZhaban(data.zhaban);
            renderRocket(data.rocket);
        } catch (e) {
            console.error(e);
        }
    }

    function copyCode(code) {
        navigator.clipboard.writeText(code);
        // 可选：添加个小的UI反馈
    }

    // 渲染炸板表
    function renderZhaban(list) {
        const tbody = document.getElementById('zhabanTable');
        tbody.innerHTML = '';

        let hasNew = false;

        if (list.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" class="text-center text-muted">暂无数据</td></tr>';
            return;
        }

        list.forEach(item => {
            // 声音报警逻辑
            if (!seenZhaban.has(item.code)) {
                seenZhaban.add(item.code);
                hasNew = true;
            }

            let dropClass = item.drop > -2.0 ? 'txt-gold' : 'text-muted';

            const row = `
                <tr>
                    <td><span class="txt-blue" onclick="copyCode('${item.code}')">${item.code}</span></td>
                    <td>${item.name}</td>
                    <td><span class="badge-industry">${item.industry}</span></td>
                    <td class="txt-red">+${item.pct}%</td>
                    <td class="${dropClass}">${item.drop}%</td>
                </tr>
            `;
            tbody.innerHTML += row;
        });

        if (hasNew) playAlert();
    }

    // 渲染火箭表
    function renderRocket(list) {
        const tbody = document.getElementById('rocketTable');
        tbody.innerHTML = '';

        if (list.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" class="text-center text-muted">暂无数据</td></tr>';
            return;
        }

        list.forEach(item => {
            // 涨速越快颜色越显眼
            let speedClass = item.speed > 2.0 ? 'txt-speed' : 'txt-red';

            const row = `
                <tr>
                    <td><span class="txt-blue" onclick="copyCode('${item.code}')">${item.code}</span></td>
                    <td>${item.name}</td>
                    <td><span class="badge-industry">${item.industry}</span></td>
                    <td class="txt-red">+${item.pct}%</td>
                    <td class="${speedClass}">+${item.speed}%</td>
                </tr>
            `;
            tbody.innerHTML += row;
        });
    }
</script>

</body>
</html>
